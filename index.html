<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>綿密 Mian Mi - Mi幣中心</title>
    <style>
        body { background: #1a1a1a; color: #d4af37; font-family: "PingFang TC", sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { border: 1px solid #d4af37; border-radius: 20px; padding: 30px; width: 100%; max-width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); background: linear-gradient(145deg, #222, #111); margin-bottom: 20px; text-align: center; }
        h1 { letter-spacing: 8px; margin: 0; font-size: 24px; }
        .balance { font-size: 60px; font-weight: bold; margin: 20px 0; color: #fff; text-shadow: 0 0 10px #d4af37; transition: all 0.3s; }
        .mission-list { width: 100%; max-width: 350px; text-align: left; }
        .mission-item { background: #2a2a2a; border: 1px solid #444; border-radius: 10px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .mission-item:active { transform: scale(0.95); background: #333; }
        .mission-name { color: #eee; font-size: 14px; }
        .mission-reward { color: #d4af37; font-weight: bold; }
        .btn { background: #d4af37; color: #000; padding: 15px 0; border-radius: 10px; text-decoration: none; font-weight: bold; display: block; width: 100%; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="card">
        <h1>綿密 MIAN MI</h1>
        <p style="font-size: 12px; opacity: 0.8;">專屬監製・頂奢認證</p>
        <div id="balanceNum" class="balance">0</div>
        <p style="margin: 0; opacity: 0.6;">目前累積 Mi 幣</p>
        <a href="#" class="btn" onclick="redeem()">兌換 56% 磷蝦油</a>
    </div>

    <div class="mission-list">
        <p style="font-weight: bold;">賺取 Mi 幣任務</p>
        <div class="mission-item" onclick="reviewMission()">
            <div class="mission-name">📸 分享貓咪使用貓砂照片</div>
            <div class="mission-reward">+200 (需審核)</div>
        </div>
        <div class="mission-item" onclick="addCoins(50)">
            <div class="mission-name">📦 掃描箱內 QR Code</div>
            <div class="mission-reward">+50</div>
        </div>
    </div>

    <script>
        let currentBalance = 0;

        // 自動入帳（模擬掃碼）
        function addCoins(amount) {
            currentBalance += amount;
            document.getElementById('balanceNum').innerText = currentBalance;
            document.getElementById('balanceNum').style.transform = "scale(1.2)";
            setTimeout(() => {
                document.getElementById('balanceNum').style.transform = "scale(1)";
            }, 100);
        }

        // 人工審核機制
        function reviewMission() {
            // 跳出對話框，不直接加幣
            alert("✅ 感謝分享！照片已送出，專人審核中。\n審核通過後 Mi 幣將自動撥入您的帳戶。");
        }

        function redeem() {
            if(currentBalance >= 1000) {
                alert("恭喜！已幫您保留 56% 磷蝦油優先購買權！");
                currentBalance -= 1000;
                document.getElementById('balanceNum').innerText = currentBalance;
            } else {
                alert("Mi 幣不足，再多存一點唷！");
            }
        }
    </script>
</body>
</html>
